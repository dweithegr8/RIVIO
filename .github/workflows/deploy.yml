name: Deploy to Hostinger via SSH

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # --- BACKEND (LARAVEL) BUILD ---
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
          coverage: none

      - name: Install Composer Dependencies
        run: |
          cd backend
          composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      # --- FRONTEND (REACT) BUILD ---
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install and Build Frontend
        env:
          VITE_API_URL: https://${{ secrets.HOSTINGER_DOMAIN }}/api
        run: |
          cd frontend
          npm install
          npm run build

      # --- DEPLOYMENT ---
      - name: Deploy to Hostinger via rsync
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-avz --delete"
          REMOTE_HOST: ${{ secrets.SSH_SERVER_IP }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          REMOTE_PORT: 65002
          SOURCE: "backend/"
          TARGET: "/home/${{ secrets.SSH_USER }}/domains/${{ secrets.HOSTINGER_DOMAIN }}/backend-app/"
          EXCLUDE: "/node_modules/, .env, .git/, /storage/logs/*, /storage/framework/cache/*"
        
      - name: Deploy Frontend to public_html
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-avz --delete"
          REMOTE_HOST: ${{ secrets.SSH_SERVER_IP }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          REMOTE_PORT: 65002
          SOURCE: "frontend/dist/"
          TARGET: "/home/${{ secrets.SSH_USER }}/domains/${{ secrets.HOSTINGER_DOMAIN }}/public_html/"
          EXCLUDE: ".git/, /api"

      # --- POST-DEPLOYMENT COMMANDS ---
      - name: Run Laravel Migrations and Clear Cache
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          port: 65002
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/${{ secrets.SSH_USER }}/domains/${{ secrets.HOSTINGER_DOMAIN }}/backend-app/

            # Always write fresh .env from GitHub Secrets
            cat > .env << 'ENVEOF'
            APP_NAME="Rivio"
            APP_ENV=production
            APP_DEBUG=true
            APP_URL=https://${{ secrets.HOSTINGER_DOMAIN }}
            APP_KEY=

            DB_CONNECTION=mysql
            DB_HOST=127.0.0.1
            DB_PORT=3306
            DB_DATABASE=${{ secrets.DB_DATABASE }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}

            CACHE_DRIVER=file
            SESSION_DRIVER=file
            SESSION_LIFETIME=120
            SESSION_DOMAIN=${{ secrets.HOSTINGER_DOMAIN }}
            QUEUE_CONNECTION=sync

            SANCTUM_STATEFUL_DOMAINS=${{ secrets.HOSTINGER_DOMAIN }}
            API_PREFIX=api
            ENVEOF

            # Generate app key if not set
            grep -q "^APP_KEY=base64:" .env || php artisan key:generate --force

            php artisan optimize:clear
            php artisan config:clear
            php artisan route:clear
            php artisan migrate --force

            # Create a real api/ directory with a robust bridge
            cd /home/${{ secrets.SSH_USER }}/domains/${{ secrets.HOSTINGER_DOMAIN }}/public_html/
            rm -rf api && mkdir -p api
            
            # Create autonomous Laravel bridge with BaseUrl override
            cat > api/index.php << 'PHPEOF'
            <?php
            define('LARAVEL_START', microtime(true));
            require __DIR__.'/../../backend-app/vendor/autoload.php';
            $app = require_once __DIR__.'/../../backend-app/bootstrap/app.php';
            
            $request = Illuminate\Http\Request::capture();
            
            // FORCE Laravel to see the /api prefix by clearing the auto-detected BaseUrl
            // This makes the PathInfo include "/api/..." which matches the 'api' routes
            $request->setBaseUrl('');
            
            // Final Diagnostics
            if (isset($_GET['diag'])) {
                header('Content-Type: text/plain');
                echo "URI: " . $request->getRequestUri() . "\n";
                echo "PATH_INFO: " . $request->getPathInfo() . "\n";
                echo "BASE_URL (forced): '" . $request->getBaseUrl() . "'\n";
                echo "API_PREFIX: " . env('API_PREFIX') . "\n";
                
                echo "\n--- ROUTES ---\n";
                try {
                    $router = $app->make('router');
                    foreach ($router->getRoutes() as $route) {
                        echo implode('|', $route->methods()) . " " . $route->uri() . "\n";
                    }
                } catch (\Exception $e) { echo "Error: " . $e->getMessage(); }
                exit;
            }

            $app->handleRequest($request);
            PHPEOF
            chmod 644 api/index.php

            # Create helper .htaccess for the api directory
            cat > api/.htaccess << 'HTACCESS'
            Options +FollowSymLinks
            RewriteEngine On
            RewriteBase /api/
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^(.*)$ index.php [L,QSA]
            HTACCESS
            chmod 644 api/.htaccess
