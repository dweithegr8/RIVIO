name: Deploy to Hostinger via SSH

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # --- BACKEND (LARAVEL) BUILD ---
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
          coverage: none

      - name: Install Composer Dependencies
        run: |
          cd backend
          composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      # --- FRONTEND (REACT) BUILD ---
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install and Build Frontend
        env:
          VITE_API_URL: https://${{ secrets.HOSTINGER_DOMAIN }}/api
        run: |
          cd frontend
          npm install
          npm run build

      # --- DEPLOYMENT ---
      - name: Deploy Backend to Hostinger via rsync
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-avz --delete"
          REMOTE_HOST: ${{ secrets.SSH_SERVER_IP }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          REMOTE_PORT: 65002
          SOURCE: "backend/"
          TARGET: "/home/${{ secrets.SSH_USER }}/domains/${{ secrets.HOSTINGER_DOMAIN }}/backend-app/"
          EXCLUDE: "/node_modules/, .env, .git/, /storage/logs/*, /storage/framework/cache/*"

      - name: Deploy Frontend to public_html
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-avz --delete"
          REMOTE_HOST: ${{ secrets.SSH_SERVER_IP }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          REMOTE_PORT: 65002
          SOURCE: "frontend/dist/"
          TARGET: "/home/${{ secrets.SSH_USER }}/domains/${{ secrets.HOSTINGER_DOMAIN }}/public_html/"
          EXCLUDE: ".git/"

      # --- POST-DEPLOYMENT COMMANDS ---
      - name: Run Laravel Migrations and Clear Cache
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          port: 65002
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/${{ secrets.SSH_USER }}/domains/${{ secrets.HOSTINGER_DOMAIN }}/backend-app/

            # Always write fresh .env from GitHub Secrets
            cat > .env << 'ENVEOF'
            APP_NAME="RepuFeed"
            APP_ENV=production
            APP_DEBUG=false
            APP_URL=https://${{ secrets.HOSTINGER_DOMAIN }}
            APP_KEY=

            DB_CONNECTION=mysql
            DB_HOST=127.0.0.1
            DB_PORT=3306
            DB_DATABASE=${{ secrets.DB_DATABASE }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}

            SESSION_DRIVER=file
            SESSION_LIFETIME=120

            CACHE_STORE=file
            QUEUE_CONNECTION=sync
            FILESYSTEM_DISK=local

            LOG_CHANNEL=stack
            LOG_STACK=single
            LOG_LEVEL=error

            SANCTUM_STATEFUL_DOMAINS=${{ secrets.HOSTINGER_DOMAIN }}
            ENVEOF

            # Generate app key if not set
            grep -q "^APP_KEY=base64:" .env || php artisan key:generate --force

            php artisan optimize:clear
            php artisan migrate --force

            # Create physical API directory (Robust replacement for Symlinks)
            DOMAIN_PATH="/home/${{ secrets.SSH_USER }}/domains/${{ secrets.HOSTINGER_DOMAIN }}"
            API_PATH="$DOMAIN_PATH/public_html/api"
            LARAVEL_PATH="$DOMAIN_PATH/backend-app"
            
            echo "Setting up physical API proxy at $API_PATH"
            rm -rf "$API_PATH"
            mkdir -p "$API_PATH"
            
            # Copy entry point and htaccess
            cp "$LARAVEL_PATH/public/index.php" "$API_PATH/index.php"
            cp "$LARAVEL_PATH/public/.htaccess" "$API_PATH/.htaccess"

            # Update index.php to find the Laravel engine in the sibling folder
            # We change ../ with ../../backend-app/
            sed -i 's|__DIR__.\/..\/|__DIR__.\/..\/..\/backend-app\/|g' "$API_PATH/index.php"

            # Fix .htaccess for the /api subdirectory
            if ! grep -q "RewriteBase /api" "$API_PATH/.htaccess"; then
                sed -i '/RewriteEngine On/a \    RewriteBase /api' "$API_PATH/.htaccess"
            fi
            
            echo "✅ API Routing setup complete!"
