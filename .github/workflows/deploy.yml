name: Deploy to Hostinger via SSH

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # --- BACKEND (LARAVEL) BUILD ---
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
          coverage: none

      - name: Install Composer Dependencies
        run: |
          cd backend
          composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      # --- FRONTEND (REACT) BUILD ---
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install and Build Frontend
        env:
          VITE_API_URL: https://${{ secrets.HOSTINGER_DOMAIN }}/api
        run: |
          cd frontend
          npm install
          npm run build

      # --- DEPLOYMENT ---
      - name: Deploy Backend to Hostinger via rsync
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-avz --delete"
          REMOTE_HOST: ${{ secrets.SSH_SERVER_IP }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          REMOTE_PORT: 65002
          SOURCE: "backend/"
          TARGET: "/home/${{ secrets.SSH_USER }}/domains/${{ secrets.HOSTINGER_DOMAIN }}/backend-app/"
          EXCLUDE: "/node_modules/, .env, .git/, /storage/logs/*, /storage/framework/cache/*"

      - name: Deploy Frontend to public_html
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-avz --delete"
          REMOTE_HOST: ${{ secrets.SSH_SERVER_IP }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          REMOTE_PORT: 65002
          SOURCE: "frontend/dist/"
          TARGET: "/home/${{ secrets.SSH_USER }}/domains/${{ secrets.HOSTINGER_DOMAIN }}/public_html/"
          EXCLUDE: ".git/"

      # --- POST-DEPLOYMENT COMMANDS ---
      - name: Run Laravel Migrations and Clear Cache
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          port: 65002
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/${{ secrets.SSH_USER }}/domains/${{ secrets.HOSTINGER_DOMAIN }}/backend-app/

            # Always write fresh .env from GitHub Secrets
            cat > .env << 'ENVEOF'
            APP_NAME="RepuFeed"
            APP_ENV=production
            APP_DEBUG=false
            APP_URL=https://${{ secrets.HOSTINGER_DOMAIN }}
            APP_KEY=

            DB_CONNECTION=mysql
            DB_HOST=127.0.0.1
            DB_PORT=3306
            DB_DATABASE=${{ secrets.DB_DATABASE }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}

            SESSION_DRIVER=file
            SESSION_LIFETIME=120

            CACHE_STORE=file
            QUEUE_CONNECTION=sync
            FILESYSTEM_DISK=local

            LOG_CHANNEL=stack
            LOG_STACK=single
            LOG_LEVEL=error

            SANCTUM_STATEFUL_DOMAINS=${{ secrets.HOSTINGER_DOMAIN }}
            ENVEOF

            # Generate app key if not set
            grep -q "^APP_KEY=base64:" .env || php artisan key:generate --force

            php artisan optimize:clear
            php artisan migrate --force

            # ===== CREATE API PROXY IN public_html =====
            DOMAIN_PATH="/home/${{ secrets.SSH_USER }}/domains/${{ secrets.HOSTINGER_DOMAIN }}"
            API_PATH="$DOMAIN_PATH/public_html/api"
            LARAVEL_PATH="$DOMAIN_PATH/backend-app"
            
            echo "Setting up API proxy at $API_PATH"
            rm -rf "$API_PATH"
            mkdir -p "$API_PATH"
            
            # Write custom index.php that points to Laravel
            # KEY FIX: Override SCRIPT_NAME so Laravel sees "/api/..." in the path
            # Without this, Laravel strips "/api" and can't match routes
            cat > "$API_PATH/index.php" << 'PHPEOF'
            <?php

            // Override SCRIPT_NAME so Laravel sees the full /api/... path
            $_SERVER['SCRIPT_NAME'] = '/index.php';
            $_SERVER['SCRIPT_FILENAME'] = __DIR__ . '/index.php';

            use Illuminate\Foundation\Application;
            use Illuminate\Http\Request;

            define('LARAVEL_START', microtime(true));

            $laravelPath = __DIR__ . '/../../backend-app';

            if (file_exists($maintenance = $laravelPath . '/storage/framework/maintenance.php')) {
                require $maintenance;
            }

            require $laravelPath . '/vendor/autoload.php';

            $app = require_once $laravelPath . '/bootstrap/app.php';

            $app->handleRequest(Request::capture());
            PHPEOF

            # Write .htaccess for the /api directory
            cat > "$API_PATH/.htaccess" << 'HTEOF'
            <IfModule mod_rewrite.c>
                <IfModule mod_negotiation.c>
                    Options -MultiViews -Indexes
                </IfModule>

                RewriteEngine On

                RewriteCond %{HTTP:Authorization} .
                RewriteRule .* - [E=HTTP_AUTHORIZATION:%{HTTP:Authorization}]

                RewriteCond %{HTTP:x-xsrf-token} .
                RewriteRule .* - [E=HTTP_X_XSRF_TOKEN:%{HTTP:X-XSRF-Token}]

                RewriteCond %{REQUEST_FILENAME} !-d
                RewriteCond %{REQUEST_URI} (.+)/$
                RewriteRule ^ %1 [L,R=301]

                RewriteCond %{REQUEST_FILENAME} !-d
                RewriteCond %{REQUEST_FILENAME} !-f
                RewriteRule ^ index.php [L]
            </IfModule>
            HTEOF

            # Set proper permissions
            chmod 644 "$API_PATH/index.php"
            chmod 644 "$API_PATH/.htaccess"
            chmod -R 775 "$LARAVEL_PATH/storage" "$LARAVEL_PATH/bootstrap/cache"

            echo "✅ Deployment complete! API proxy is ready."
