name: Deploy to Hostinger via SSH

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # --- BACKEND (LARAVEL) BUILD ---
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
          coverage: none

      - name: Install Composer Dependencies
        run: |
          cd backend
          composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      # --- FRONTEND (REACT) BUILD ---
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install and Build Frontend
        env:
          VITE_API_URL: https://${{ secrets.HOSTINGER_DOMAIN }}/api
        run: |
          cd frontend
          npm install
          npm run build

      # --- DEPLOYMENT ---
      - name: Deploy Backend to Hostinger via rsync
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          ARGS: "-avz --delete"
          REMOTE_HOST: ${{ secrets.HOSTINGER_SERVER_IP }}
          REMOTE_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          REMOTE_PORT: 65002
          SOURCE: "backend/"
          TARGET: "/home/${{ secrets.HOSTINGER_SSH_USER }}/domains/${{ secrets.HOSTINGER_DOMAIN }}/backend-app/"
          EXCLUDE: "/node_modules/, .env, .git/, /storage/logs/*, /storage/framework/cache/*"

      - name: Deploy Frontend to public_html
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          ARGS: "-avz --delete"
          REMOTE_HOST: ${{ secrets.HOSTINGER_SERVER_IP }}
          REMOTE_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          REMOTE_PORT: 65002
          SOURCE: "frontend/dist/"
          TARGET: "/home/${{ secrets.HOSTINGER_SSH_USER }}/domains/${{ secrets.HOSTINGER_DOMAIN }}/public_html/"
          EXCLUDE: ".git/"

      # --- POST-DEPLOYMENT COMMANDS ---
      - name: Run Laravel Migrations and Clear Cache
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_SERVER_IP }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          port: 65002
          key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          script: |
            cd /home/${{ secrets.HOSTINGER_SSH_USER }}/domains/${{ secrets.HOSTINGER_DOMAIN }}/backend-app/

            # Always write fresh .env from GitHub Secrets
            cat > .env << 'ENVEOF'
            APP_NAME="RepuFeed"
            APP_ENV=production
            APP_DEBUG=false
            APP_URL=https://${{ secrets.HOSTINGER_DOMAIN }}
            APP_KEY=

            DB_CONNECTION=mysql
            DB_HOST=localhost
            DB_PORT=3306
            DB_DATABASE="${{ secrets.DB_DATABASE }}"
            DB_USERNAME="${{ secrets.DB_USERNAME }}"
            DB_PASSWORD="${{ secrets.DB_PASSWORD }}"

            SESSION_DRIVER=file
            SESSION_LIFETIME=120

            CACHE_STORE=file
            QUEUE_CONNECTION=sync
            FILESYSTEM_DISK=local

            LOG_CHANNEL=stack
            LOG_STACK=single
            LOG_LEVEL=error

            SANCTUM_STATEFUL_DOMAINS=${{ secrets.HOSTINGER_DOMAIN }}
            ENVEOF

            # Find where we actually are and where artisan is
            APP_PATH=$(pwd)
            ARTISAN_PATH=$(find . -name artisan -print -quit)
            
            if [ -n "$ARTISAN_PATH" ]; then
                ARTISAN_DIR=$(dirname "$ARTISAN_PATH")
                cd "$ARTISAN_DIR"
                echo "Found artisan at $(pwd)"
                
                # Check for .env and key
                grep -q "^APP_KEY=base64:" .env || php artisan key:generate --force
                
                # Fix .htaccess for symlink compatibility
                if [ -f "public/.htaccess" ]; then
                    echo "Adjusting public/.htaccess for symlink..."
                    sed -i '/RewriteEngine On/a \    RewriteBase /api' public/.htaccess
                fi

                # Run optimizations
                php artisan optimize:clear
                php artisan migrate --force
            else
                echo "ERROR: Could not find artisan in $APP_PATH"
                exit 1
            fi

            # Handle Symlink
            PUBLIC_DIR="$(pwd)/public"
            echo "Linking public dir: $PUBLIC_DIR"
            cd /home/${{ secrets.HOSTINGER_SSH_USER }}/domains/${{ secrets.HOSTINGER_DOMAIN }}/public_html
            rm -rf api
            ln -sf "$PUBLIC_DIR" api
