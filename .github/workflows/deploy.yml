name: Deploy to Hostinger via SSH

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # --- BACKEND (LARAVEL) BUILD ---
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
          coverage: none

      - name: Install Composer Dependencies
        run: |
          cd backend
          composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      # --- FRONTEND (REACT) BUILD ---
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install and Build Frontend
        env:
          VITE_API_URL: https://${{ secrets.HOSTINGER_DOMAIN }}/api
        run: |
          cd frontend
          npm install
          npm run build

      # --- DEPLOYMENT ---
      - name: Deploy to Hostinger via rsync
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-avz --delete"
          REMOTE_HOST: ${{ secrets.SSH_SERVER_IP }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          REMOTE_PORT: 65002
          SOURCE: "backend/"
          TARGET: "/home/${{ secrets.SSH_USER }}/domains/${{ secrets.HOSTINGER_DOMAIN }}/backend-app/"
          EXCLUDE: "/node_modules/, .env, .git/, /storage/logs/*, /storage/framework/cache/*"
        
      - name: Deploy Frontend to public_html
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-avz --delete"
          REMOTE_HOST: ${{ secrets.SSH_SERVER_IP }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          REMOTE_PORT: 65002
          SOURCE: "frontend/dist/"
          TARGET: "/home/${{ secrets.SSH_USER }}/domains/${{ secrets.HOSTINGER_DOMAIN }}/public_html/"
          EXCLUDE: ".git/, /api"

      # --- POST-DEPLOYMENT COMMANDS ---
      - name: Run Laravel Migrations and Clear Cache
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          port: 65002
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/${{ secrets.SSH_USER }}/domains/${{ secrets.HOSTINGER_DOMAIN }}/backend-app/

            # Always write fresh .env from GitHub Secrets
            cat > .env << 'ENVEOF'
            APP_NAME="Rivio"
            APP_ENV=production
            APP_DEBUG=true
            APP_URL=https://${{ secrets.HOSTINGER_DOMAIN }}
            APP_KEY=

            DB_CONNECTION=mysql
            DB_HOST=127.0.0.1
            DB_PORT=3306
            DB_DATABASE=${{ secrets.DB_DATABASE }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}

            CACHE_DRIVER=file
            SESSION_DRIVER=file
            SESSION_LIFETIME=120
            SESSION_DOMAIN=${{ secrets.HOSTINGER_DOMAIN }}
            QUEUE_CONNECTION=sync

            SANCTUM_STATEFUL_DOMAINS=${{ secrets.HOSTINGER_DOMAIN }}
            API_PREFIX=api
            ENVEOF

            # Generate app key if not set
            grep -q "^APP_KEY=base64:" .env || php artisan key:generate --force

            php artisan optimize:clear
            php artisan config:clear
            php artisan route:clear
            php artisan migrate --force

            # Create a real api/ directory with a robust bridge
            cd /home/${{ secrets.SSH_USER }}/domains/${{ secrets.HOSTINGER_DOMAIN }}/public_html/
            rm -rf api && mkdir -p api
            
            # Create autonomous Laravel bridge with BaseUrl override
            cat > api/index.php << 'PHPEOF'
            <?php
            ini_set('display_errors', 1);
            error_reporting(E_ALL);

            define('LARAVEL_START', microtime(true));

            // Show diagnostic info if ?diag=1
            if (isset($_GET['diag'])) {
                header('Content-Type: application/json');
                echo json_encode([
                    'bridge' => 'alive',
                    'cwd' => getcwd(),
                    'script' => $_SERVER['SCRIPT_FILENAME'] ?? 'unknown',
                    'request_uri' => $_SERVER['REQUEST_URI'] ?? 'unknown',
                    'autoload_exists' => file_exists(__DIR__.'/../../backend-app/vendor/autoload.php'),
                    'bootstrap_exists' => file_exists(__DIR__.'/../../backend-app/bootstrap/app.php'),
                    'php_version' => PHP_VERSION,
                ]);
                exit;
            }

            try {
                $autoload = __DIR__.'/../../backend-app/vendor/autoload.php';
                $bootstrap = __DIR__.'/../../backend-app/bootstrap/app.php';

                if (!file_exists($autoload)) {
                    die("Bridge Error: Autoload file not found at $autoload");
                }

                // Override SCRIPT_NAME so Symfony computes BaseUrl='' and PathInfo='/api/...'
                $_SERVER['SCRIPT_NAME'] = '/index.php';
                $_SERVER['SCRIPT_FILENAME'] = __DIR__ . '/index.php';

                require $autoload;
                $app = require_once $bootstrap;

                $app->handleRequest(Illuminate\Http\Request::capture());
            } catch (\Throwable $e) {
                header('Content-Type: application/json', true, 500);
                echo json_encode([
                    'bridge_error' => true,
                    'message' => $e->getMessage(),
                    'file' => $e->getFile(),
                    'line' => $e->getLine(),
                    'trace' => array_slice(explode("\n", $e->getTraceAsString()), 0, 15),
                ]);
            }
            PHPEOF
            chmod 644 api/index.php

            # Create helper .htaccess for the api directory
            cat > api/.htaccess << 'HTACCESS'
            Options +FollowSymLinks
            RewriteEngine On
            RewriteBase /api/
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^(.*)$ index.php [L,QSA]
            HTACCESS
            chmod 644 api/.htaccess
